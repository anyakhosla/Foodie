{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Atlanta Restaurant Finder</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initMap" async defer></script>
    <script>
        function initMap() {
            var atlanta = {lat: 33.7490, lng: -84.3880};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 13,
                center: atlanta
            });

            fetch('restaurant-data/')
                .then(response => response.json())
                .then(data => {
                    var restaurants = data.restaurants;
                    var bounds = new google.maps.LatLngBounds();

                    restaurants.forEach(function(restaurant) {
                        var position = new google.maps.LatLng(restaurant.latitude, restaurant.longitude);
                        var marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: restaurant.name
                        });

                        bounds.extend(position);

                        var infoWindowContent = '<div style="font-family: Arial, sans-serif; font-size: 14px;">' +
                        '<h3 style="margin-bottom: 5px;"><a href="http://127.0.0.1:8000/foodie/' + restaurant.id + '/" target="_blank" style="color: #1a73e8; text-decoration: none;">' + restaurant.name + '</a></h3>' +
                        '<p><strong>Address:</strong> ' + restaurant.address + '</p>' +
                        '<p><strong>Cuisine Type:</strong> ' + restaurant.cuisine + '</p>' +
                        '<p><strong>Rating:</strong> ' + restaurant.overall_rating + ' / 5</p>' +
                        '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(restaurant.address) + '" ' +
                        'target="_blank" ' +
                        'style="color: #1a73e8; text-decoration: none; font-weight: bold;">Get Directions</a>' +
                        '</div>';

                        var infoWindow = new google.maps.InfoWindow({
                            content: infoWindowContent
                        });
                    });
                    map.fitBounds(bounds);
                })
                .catch(error => {
                    console.error('Error fetching restaurant data:', error);
                });
        }
    </script>
    <style>
        #map {
            height: 100%;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>Atlanta Restaurant Finder</h1>
    <div id="map"></div>
</body>
</html>
