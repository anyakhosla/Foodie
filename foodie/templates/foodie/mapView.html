<!DOCTYPE html>
<html>
<head>
    <title>Atlanta Restaurants Map</title>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}
&callback=initMap" async defer></script>
    <script>
        function initMap() {
            var atlanta = {lat: 33.7490, lng: -84.3880};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: atlanta
            });

            var restaurants = [
                {lat: 33.7550, lng: -84.3900, name: 'Restaurant 1'},
                {lat: 33.7600, lng: -84.3850, name: 'Restaurant 2'},
                {lat: 33.7450, lng: -84.3950, name: 'Restaurant 3'}
            ];

            restaurants.forEach(function(restaurant) {
                var marker = new google.maps.Marker({
                    position: {lat: restaurant.lat, lng: restaurant.lng},
                    map: map,
                    title: restaurant.name
                });

                var infoWindowContent = '<div style="font-family: Arial, sans-serif; font-size: 14px;">' +
                    '<h3 style="margin-bottom: 5px;">' + restaurant.name + '</h3>' +
                    '<p><strong>Address:</strong> ' + restaurant.address + '</p>' +
                    '<p><strong>Cuisine Type:</strong> ' + restaurant.cuisine + '</p>' +
                    '<p><strong>Rating:</strong> ' + restaurant.overall_rating + ' / 5</p>' +
                    '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(restaurant.address) + '" ' +
                    'target="_blank" ' +
                    'style="color: #1a73e8; text-decoration: none; font-weight: bold;">Get Directions</a>' +
                    '</div>';

                var infoWindow = new google.maps.InfoWindow({
                    content: infoWindowContent
                });

                marker.addListener('click', function() {
                    infoWindow.open(map, marker);
                });
            });
        }
    </script>
    <style>
        #map {
            height: 100%;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>Atlanta Restaurants</h1>
    <div id="map"></div>
</body>
</html>
