<h2>Register</h2>
{%extends 'base.html' %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

{% block content %}
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">
      <h2 class="text-center mb-4">Register</h2>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.username.label_tag }}
          {{ form.username }}
        </div>
        <div class="mb-3">
          {{ form.password1.label_tag }}
          {{ form.password1 }}
        </div>
        <div class="mb-3">
          {{ form.password2.label_tag }}
          {{ form.password2 }}
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
