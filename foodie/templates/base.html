{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie App</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'base.css' %}">
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="{% url 'foodie:restaurant_list' %}">Restaurant List</a>
            <a href="{% url 'foodie:mapView' %}">Back to Map</a>
        </div>
        {% if loggedIn %}
            <div class="nav-right">
                <a href="{% url 'foodie:user_profile_page' %}">User Page</a>
            </div>
        {% endif %}
    </div>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
